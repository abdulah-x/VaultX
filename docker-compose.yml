name: VaultX

services:
  # 1. Database (Starts First)
  postgres:
    image: timescale/timescaledb:2.17.2-pg15
    container_name: VaultX-Database
    environment:
      # Credentials come from the root .env (see .env.example); the :- defaults
      # keep local dev working out of the box but let real deployments override
      # them without editing this file.
      POSTGRES_DB: ${POSTGRES_DB:-crypto_portfolio}
      POSTGRES_USER: ${POSTGRES_USER:-crypto_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-crypto_password}
      POSTGRES_INITDB_ARGS: "-E UTF8"
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    networks:
      - vaultx_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-crypto_user} -d ${POSTGRES_DB:-crypto_portfolio}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # 1b. Redis (token blacklist + OTP store)
  redis:
    image: redis:7-alpine
    container_name: VaultX-Redis
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD:-changeme_dev_redis_password}"]
    ports:
      # Bound to localhost only — Redis holds the JWT blacklist and OTP codes,
      # so it must not be reachable from the LAN/internet.
      - "127.0.0.1:6380:6379"
    networks:
      - vaultx_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-changeme_dev_redis_password}", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # 2. Backend (Starts Second, depends on DB)
  backend:
    build: ./backend
    container_name: VaultX-Backend
    ports:
      - "8001:8000"
    environment:
      - DEBUG=true
      - DATABASE_URL=postgresql://${POSTGRES_USER:-crypto_user}:${POSTGRES_PASSWORD:-crypto_password}@postgres:5432/${POSTGRES_DB:-crypto_portfolio}
      - REDIS_URL=redis://:${REDIS_PASSWORD:-changeme_dev_redis_password}@redis:6379/0
      - FRONTEND_URL=http://localhost:3100
      # Google OAuth
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      # Google Gemini (LLM Portfolio Advisor) - server-side only
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      # Allow frontend to access backend
      - ALLOWED_ORIGINS=["http://localhost:3100", "http://127.0.0.1:3100"]
    volumes:
      - ./backend:/app
      - backend_data:/app/data
      - backup_data:/app/backups
    networks:
      - vaultx_network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # 2b. Stream writer (Redis Streams -> TimescaleDB price ingestion)
  stream-writer:
    build: ./backend
    container_name: VaultX-StreamWriter
    # cwd stays /app (matching the backend service) so the mounted backend/.env
    # (at /app/.env) resolves via pydantic-settings' relative env_file path;
    # PYTHONPATH adds /app/app so `data_pipeline`/`core`/`database` resolve as
    # bare imports the same way main.py's sys.path.append does for the API.
    command: ["python", "-m", "data_pipeline.stream_writer"]
    environment:
      - DEBUG=true
      - PYTHONPATH=/app/app
      - DATABASE_URL=postgresql://${POSTGRES_USER:-crypto_user}:${POSTGRES_PASSWORD:-crypto_password}@postgres:5432/${POSTGRES_DB:-crypto_portfolio}
      - REDIS_URL=redis://:${REDIS_PASSWORD:-changeme_dev_redis_password}@redis:6379/0
      # BINANCE_API_KEY/SECRET/TESTNET deliberately NOT listed here — docker-compose
      # substitutes those from the ROOT .env, which doesn't carry them (only
      # backend/.env does; same gotcha documented for GEMINI_API_KEY). Omitting
      # them lets pydantic-settings read the real values straight from the
      # mounted backend/.env instead of an empty override shadowing it.
    volumes:
      - ./backend:/app
    networks:
      - vaultx_network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  # 3. Frontend (Starts Last, depends on Backend)
  frontend:
    build:
      context: ./frontend
      args:
        - NEXT_PUBLIC_API_URL=http://localhost:8001
        - NEXT_PUBLIC_GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
    container_name: VaultX-Frontend
    ports:
      - "3100:3000"
    environment:
      # Browser-side access (Public URL)
      - NEXT_PUBLIC_API_URL=http://localhost:8001
      - NEXT_PUBLIC_GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
    networks:
      - vaultx_network
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  backend_data:
    driver: local
  postgres_data:
    driver: local
  backup_data:
    driver: local

networks:
  vaultx_network:
    driver: bridge
