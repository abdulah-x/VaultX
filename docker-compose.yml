name: VaultX

services:
  # 1. Database (Starts First)
  postgres:
    image: postgres:15-alpine
    container_name: VaultX-Database
    environment:
      POSTGRES_DB: crypto_portfolio
      POSTGRES_USER: crypto_user
      POSTGRES_PASSWORD: crypto_password
      POSTGRES_INITDB_ARGS: "-E UTF8"
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    networks:
      - vaultx_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U crypto_user -d crypto_portfolio"]
      interval: 5s
      timeout: 5s
      retries: 5

  # 1b. Redis (token blacklist + OTP store)
  redis:
    image: redis:7-alpine
    container_name: VaultX-Redis
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD:-changeme_dev_redis_password}"]
    ports:
      # Bound to localhost only — Redis holds the JWT blacklist and OTP codes,
      # so it must not be reachable from the LAN/internet.
      - "127.0.0.1:6380:6379"
    networks:
      - vaultx_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-changeme_dev_redis_password}", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # 2. Backend (Starts Second, depends on DB)
  backend:
    build: ./backend
    container_name: VaultX-Backend
    ports:
      - "8001:8000"
    environment:
      - DEBUG=true
      - DATABASE_URL=postgresql://crypto_user:crypto_password@postgres:5432/crypto_portfolio
      - REDIS_URL=redis://:${REDIS_PASSWORD:-changeme_dev_redis_password}@redis:6379/0
      - FRONTEND_URL=http://localhost:3100
      # Google OAuth
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      # Google Gemini (LLM Portfolio Advisor) - server-side only
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      # Allow frontend to access backend
      - ALLOWED_ORIGINS=["http://localhost:3100", "http://127.0.0.1:3100"]
    volumes:
      - ./backend:/app
      - backend_data:/app/data
      - backup_data:/app/backups
    networks:
      - vaultx_network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # 3. Frontend (Starts Last, depends on Backend)
  frontend:
    build:
      context: ./frontend
      args:
        - NEXT_PUBLIC_API_URL=http://localhost:8001
        - NEXT_PUBLIC_GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
    container_name: VaultX-Frontend
    ports:
      - "3100:3000"
    environment:
      # Browser-side access (Public URL)
      - NEXT_PUBLIC_API_URL=http://localhost:8001
      - NEXT_PUBLIC_GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
    networks:
      - vaultx_network
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  backend_data:
    driver: local
  postgres_data:
    driver: local
  backup_data:
    driver: local

networks:
  vaultx_network:
    driver: bridge
